name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/portfolio:latest

    - name: Deploy to Azure VM
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio:latest
          docker stop my-portfolio || true
          docker rm my-portfolio || true
          docker run -d \
            --name my-portfolio \
            -p 3000:3000 \
            --env-file /home/azureuser/sachin.dev/.env.local \
            ${{ secrets.DOCKER_USERNAME }}/portfolio:latest  
